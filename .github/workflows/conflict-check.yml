name: Git Conflict Detector Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ test-conflict-workflow ]

jobs:
  conflict-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug PR Info
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "Base Ref: ${{ github.event.pull_request.base.ref }}"
          echo "Head Ref: ${{ github.event.pull_request.head.ref }}"
          echo "Event Type: ${{ github.event_name }}"

      - name: Fetch All Branches
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch --all
          git branch -a

      - name: Check for Merge Conflicts
        id: check_conflicts
        run: |
          # Get the base and head refs
          BASE_REF=${{ github.event.pull_request.base.ref || 'develop' }}
          HEAD_REF=${{ github.event.pull_request.head.ref || github.ref_name }}
          
          # Checkout base branch
          git checkout $BASE_REF
          
          # Try to merge and check for conflicts
          if ! git merge --no-commit --no-ff $HEAD_REF 2>&1; then
            echo "CONFLICT=true" >> $GITHUB_OUTPUT
            echo "Found conflicts between $BASE_REF and $HEAD_REF"
            git merge --abort
          else
            echo "CONFLICT=false" >> $GITHUB_OUTPUT
            echo "No conflicts found between $BASE_REF and $HEAD_REF"
            git merge --abort
          fi
          
          echo "Conflict status: ${{ steps.check_conflicts.outputs.CONFLICT }}"

      - name: Comment on PR if Conflict Found
        if: steps.check_conflicts.outputs.CONFLICT == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const conflictMsg = '🚨 **Merge conflict detected!** Please resolve conflicts before merging.';
            console.log('Attempting to create comment on PR:', prNumber);
            try {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: conflictMsg
              });
              console.log('Comment created successfully');
            } catch (error) {
              console.error('Error creating comment:', error);
              console.log('Error details:', error.response?.data);
            }
 