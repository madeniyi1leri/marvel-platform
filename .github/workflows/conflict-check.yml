name: Git Conflict Detector Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ test-conflict-workflow ]

jobs:
  conflict-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug PR Info
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "Base Ref: ${{ github.event.pull_request.base.ref }}"
          echo "Head Ref: ${{ github.event.pull_request.head.ref }}"
          echo "Event Type: ${{ github.event_name }}"

      - name: Fetch All Branches
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch --all
          git branch -a

      - name: Check for Merge Conflicts
        run: |
          git checkout ${{ github.event.pull_request.base.ref || 'develop' }}
          git status
          if ! git merge --no-commit --no-ff ${{ github.event.pull_request.head.ref || github.ref_name }}; then
            echo "conflict=true" >> $GITHUB_ENV
            git merge --abort
          else
            echo "conflict=false" >> $GITHUB_ENV
            git merge --abort
          fi
          echo "Conflict status: ${{ env.conflict }}"

      - name: Comment on PR if Conflict Found
        if: env.conflict == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const conflictMsg = '🚨 **Merge conflict detected!** Please resolve conflicts before merging.';
            console.log('Attempting to create comment on PR:', prNumber);
            try {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: conflictMsg
              });
              console.log('Comment created successfully');
            } catch (error) {
              console.error('Error creating comment:', error);
            }
