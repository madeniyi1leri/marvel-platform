name: Git Conflict Detector Workflow

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  push:
    branches: [ test-conflict-workflow ]

jobs:
  conflict-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      checks: write
    steps:
      - name: Debug Workflow Trigger
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "Base Ref: ${{ github.event.pull_request.base.ref }}"
          echo "Head Ref: ${{ github.event.pull_request.head.ref }}"
          echo "Repository: ${{ github.repository }}"

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check for Merge Conflicts
        id: check_conflicts
        run: |
          #!/bin/bash
          set -e
          
          # Get the base and head refs
          BASE_REF=${{ github.event.pull_request.base.ref || 'develop' }}
          HEAD_REF=${{ github.event.pull_request.head.ref || github.ref_name }}
          
          echo "Checking for conflicts between $BASE_REF and $HEAD_REF"
          
          # Checkout base branch
          git checkout "$BASE_REF"
          
          # Try to merge and check for conflicts
          if ! git merge --no-commit --no-ff "$HEAD_REF" 2>&1; then
            echo "HAS_CONFLICT=true" >> $GITHUB_ENV
            echo "Found conflicts between $BASE_REF and $HEAD_REF"
            
            # Get list of conflicting files
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
            echo "CONFLICT_FILES<<EOF" >> $GITHUB_ENV
            echo "$CONFLICT_FILES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            
            # Get conflict details for each file
            for file in $CONFLICT_FILES; do
              CONFLICT_DETAILS=$(git diff --unified=0 "$file" | grep -A 3 '^@@' | sed 's/^/    /')
              echo "CONFLICT_$file<<EOF" >> $GITHUB_ENV
              echo "$CONFLICT_DETAILS" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            done
            
            git merge --abort
          else
            echo "HAS_CONFLICT=false" >> $GITHUB_ENV
            echo "No conflicts found between $BASE_REF and $HEAD_REF"
            git merge --abort
          fi

      - name: Create Check Run for Conflicts
        if: env.HAS_CONFLICT == 'true' && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const conflictFiles = process.env.CONFLICT_FILES.split('\n').filter(Boolean);
            const conflictDetails = conflictFiles.map(file => `- \`${file}\``).join('\n');
            
            try {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Merge Conflict Check',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'failure',
                output: {
                  title: 'Merge conflicts detected',
                  summary: 'This pull request has merge conflicts that need to be resolved.',
                  text: `### Conflicting Files:\n${conflictDetails}\n\n` +
                    '### How to Resolve:\n' +
                    `1. Pull the latest changes from ${context.payload.pull_request.base.ref}\n` +
                    '2. Resolve conflicts in the files listed above\n' +
                    '3. Commit your changes\n' +
                    '4. Push to your branch'
                }
              });
              console.log('Created check run successfully');
            } catch (error) {
              console.error('Error creating check run:', error);
            }

      - name: Generate AI Suggestions
        if: env.HAS_CONFLICT == 'true' && github.event_name == 'pull_request_target'
        run: |
          #!/bin/bash
          set -e
          
          # Get list of conflicting files
          CONFLICT_FILES=$(echo "$CONFLICT_FILES" | tr '\n' ' ')
          
          # Generate suggestions for each file
          for file in $CONFLICT_FILES; do
            CONFLICT_DETAILS=$(eval echo "\$CONFLICT_$file")
            
            # Create a prompt for the AI
            PROMPT="I have a merge conflict in $file. Here are the conflict details:\n\n$CONFLICT_DETAILS\n\nPlease suggest how to resolve this conflict. Consider:\n1. The context of the changes\n2. Best practices for this type of file\n3. Similar conflicts you've seen before\n\nProvide specific suggestions for resolving the conflict."
            
            # Store the prompt for the comment
            echo "SUGGESTION_$file<<EOF" >> $GITHUB_ENV
            echo "$PROMPT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          done

      - name: Comment on PR if Conflict Found
        if: env.HAS_CONFLICT == 'true' && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const conflictFiles = process.env.CONFLICT_FILES.split('\n').filter(Boolean);
            
            // Build the conflict message with AI suggestions
            let conflictMsg = '🚨 **Merge conflict detected!** Please resolve conflicts before merging.\n\n' +
              '### Conflicting Files:\n' +
              conflictFiles.map(file => `- \`${file}\``).join('\n') + '\n\n' +
              '### How to Resolve:\n' +
              `1. Pull the latest changes from ${context.payload.pull_request.base.ref}\n` +
              '2. Resolve conflicts in the files listed above\n' +
              '3. Commit your changes\n' +
              '4. Push to your branch\n\n' +
              '### AI Suggestions for Resolution:\n\n';
            
            // Add AI suggestions for each file
            for (const file of conflictFiles) {
              const suggestion = process.env[`SUGGESTION_${file}`];
              if (suggestion) {
                conflictMsg += `#### ${file}\n${suggestion}\n\n`;
              }
            }
            
            console.log('Attempting to create comment on PR:', prNumber);
            try {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: conflictMsg
              });
              console.log('Comment created successfully');
            } catch (error) {
              console.error('Error creating comment:', error);
              console.log('Error details:', error.response?.data);
            }

      - name: Update Check Run if No Conflicts
        if: env.HAS_CONFLICT == 'false' && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Merge Conflict Check',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'No merge conflicts',
                  summary: 'This pull request has no merge conflicts.',
                  text: '✅ All good! No merge conflicts detected.'
                }
              });
              console.log('Updated check run successfully');
            } catch (error) {
              console.error('Error updating check run:', error);
            }
 