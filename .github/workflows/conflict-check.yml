name: Git Conflict Detector

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  conflict-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch All Branches
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch --all

      - name: Check for Merge Conflicts
        run: |
          git checkout ${{ github.event.pull_request.base.ref }}
          if ! git merge --no-commit --no-ff ${{ github.event.pull_request.head.ref }}; then
            echo "conflict=true" >> $GITHUB_ENV
            git merge --abort
          else
            git merge --abort
          fi

      - name: Comment on PR if Conflict Found
        if: env.conflict == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const conflictMsg = '🚨 **Merge conflict detected!** Please resolve conflicts before merging.';
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: conflictMsg
            });
